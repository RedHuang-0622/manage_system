server:
  port: 8080
  mode: debug
  read_timeout: 10
  read_header_timeout: 5
  write_timeout: 10
  idle_timeout: 30
  max_header_bytes: 1048576

mysql:
  host: 127.0.0.1
  port: 3306
  user: root
  # 生产环境应通过环境变量 LAB_MYSQL_PASSWORD 覆盖
  password: "your_mysql_password"
  database: lab_manage
  charset: utf8mb4
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600

redis:
  addr: 127.0.0.1:6379
  password: ""
  db: 0
  pool_size: 100
  min_idle_conns: 10

jwt:
  # 生产环境必须通过环境变量 LAB_JWT_SECRET 设置，长度 ≥ 32 字符
  secret: "change-me-to-a-random-secret-at-least-32-chars"
  expire: 7200
  issuer: "lab-system"

casbin:
  model_path: "conf/rbac_model.conf"

cors:
  # 允许的前端源列表。生产环境应配置为具体域名。
  # 留空则默认允许 localhost:5173 / localhost:3000（开发环境）。
  # 设为 ["*"] 允许所有源（不推荐生产使用）。
  allowed_origins:
    - "http://localhost:5173"
    - "http://localhost:3000"

log:
  path: "logs/app.log"
  level: info
  max_size: 100
  max_backups: 30
  max_age: 7
